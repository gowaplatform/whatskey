<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArqSevo - Importar Sessão Evolution</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Evolution API</p>
        <h1>Importador de Sessão WhatsApp</h1>
        <p class="subtitle">
          Envie o arquivo de sessão, confirme as configurações e execute a importação para atualizar a instância no banco do Evolution.
        </p>
      </div>
      <div class="status-pill" id="healthStatus">Verificando...</div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Configurações</h2>
        <form id="importForm" class="form-grid">
          <label>
            <span>Instância Evolution</span>
            <input type="text" id="instanceName" name="instanceName" placeholder="meu" required>
          </label>

          <label>
            <span>URL da Evolution API</span>
            <input type="url" id="evolutionApiUrl" name="evolutionApiUrl" placeholder="http://192.168.0.10:8080" required>
          </label>

          <label>
            <span>Global API Key</span>
            <input type="password" id="globalApiKey" name="globalApiKey" placeholder="Sua API key" required>
          </label>

          <label>
            <span>Host do Postgres</span>
            <input type="text" id="dbHost" name="dbHost" placeholder="192.168.0.234" required>
          </label>

          <label>
            <span>Porta</span>
            <input type="number" id="dbPort" name="dbPort" value="5432" required>
          </label>

          <label>
            <span>Usuário</span>
            <input type="text" id="dbUser" name="dbUser" value="postgres" required>
          </label>

          <label>
            <span>Senha</span>
            <input type="password" id="dbPassword" name="dbPassword" placeholder="Senha do banco" required>
          </label>

          <label>
            <span>Banco</span>
            <input type="text" id="dbName" name="dbName" value="evolution" required>
          </label>

          <label id="tokenField" class="full hidden">
            <span>Token de acesso</span>
            <input type="password" id="appToken" name="appToken" placeholder="APP_TOKEN configurado no servidor">
          </label>

          <label class="full">
            <span>Arquivo de sessão (.json)</span>
            <input type="file" id="sessionFile" name="sessionFile" accept=".json,application/json">
          </label>

          <label class="full">
            <span>Ou cole o JSON da sessão</span>
            <textarea id="sessionJson" name="sessionJson" rows="8" placeholder='{"noiseKey": {...}, "signedIdentityKey": {...}}'></textarea>
          </label>

          <div class="actions full">
            <button type="submit" id="runButton" class="primary">Importar e conectar</button>
            <button type="button" id="clearLogs" class="secondary">Limpar logs</button>
          </div>
        </form>
      </section>

      <section class="card logs-card">
        <div class="logs-header">
          <h2>Logs da execução</h2>
          <span id="runState" class="run-state idle">Aguardando</span>
        </div>
        <pre id="logOutput" class="log-output">Nenhuma execução ainda.</pre>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
