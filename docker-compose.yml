services:
  arqsevo-import:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      APP_TOKEN: ${APP_TOKEN:-}
      INSTANCE_NAME: ${INSTANCE_NAME:-meu}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://host.docker.internal:8080}
      GLOBAL_API_KEY: ${GLOBAL_API_KEY:-}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-evolution}
      SESSION_FILE: ${SESSION_FILE:-}
    volumes:
      - ./data:/app/data
